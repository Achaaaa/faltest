<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>PeraModelGenerator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #121212;
            --bg-sidebar: #010101;
            --bg-card: #181818;
            --bg-hover: #282828;
            --accent: #1DB954;
            --accent-hover: #1ed760;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --border: rgba(255, 255, 255, 0.1);
            --success: #1DB954;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
        }

        #canvas-container {
            flex: 1;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at center, #1e1e1e 0%, #121212 100%);
        }

        #ui {
            width: 380px;
            height: calc(100vh - 16px);
            margin: 8px;
            background: var(--bg-sidebar);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 22px;
            margin: 0 0 24px 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid transparent;
            color: #fff;
            padding: 14px;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.25s;
        }

        input[type="text"]:focus,
        textarea:focus {
            background: var(--bg-hover);
            border-color: #535353;
            outline: none;
        }

        .file-input-area {
            width: 100%;
            height: 140px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.3, 0, 0, 1);
        }

        .file-input-area:hover {
            background: var(--bg-hover);
            border-color: var(--text-sub);
            transform: scale(1.02);
        }

        .file-input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
        }

        .file-input-area img {
            position: absolute;
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
            object-fit: contain;
        }

        #status-tracker {
            margin-bottom: 24px;
            background: var(--bg-card);
            border-radius: 10px;
            padding: 12px;
        }

        .status-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-sub);
            gap: 14px;
            transition: 0.2s;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .status-item.active {
            color: var(--accent);
            font-weight: 600;
        }

        .status-item.done {
            color: #fff;
        }

        .status-icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 500px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        #genBtn {
            background: var(--accent);
            color: #000;
            margin: 12px 0;
        }

        #genBtn:hover {
            background: var(--accent-hover);
            transform: scale(1.04);
        }

        #genBtn:disabled {
            background: #535353;
            cursor: not-allowed;
            color: #b3b3b3;
        }

        #applyCurrentBtn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid #727272;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 32px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .preview-box {
            position: relative;
            aspect-ratio: 1;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .preview-box img {
            width: 100%;
            height: calc(100% - 24px);
            object-fit: cover;
            border-radius: 8px;
            background: #222;
        }

        .p-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-sub);
            text-align: center;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .preview-controls {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all 0.3s;
            width: 32px;
            height: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-controls.is-open {
            width: 80px;
            height: auto;
            border-radius: 12px;
            padding: 8px 4px;
        }

        .settings-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-sub);
            font-size: 14px;
        }

        .mode-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #535353;
        }

        .mode-dot.is-manual {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .controls-content {
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            align-items: center;
            pointer-events: none;
        }

        .preview-controls.is-open .controls-content {
            opacity: 1;
            pointer-events: auto;
        }

        .manual-btn {
            background: #fff;
            border: none;
            color: #000;
            font-size: 8px;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 900;
            width: 90%;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #535353;
            transition: .4s;
            border-radius: 18px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(14px);
        }

        .mode-text {
            font-size: 8px;
            font-weight: 900;
            color: var(--text-sub);
            text-align: center;
            text-transform: uppercase;
        }

        .camera-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 16px;
            border-radius: 500px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 800;
            z-index: 10;
        }

        #cameraContainer {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: #000;
            border-radius: 20px;
            z-index: 1000;
            box-shadow: 0 0 0 10000px rgba(0, 0, 0, 0.7);
        }

        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
        }

        .snap-btn {
            background: var(--accent);
            color: #000;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h3>PeraModelGenerator</h3>

        <div id="status-tracker">
            <div class="status-item" id="st-1"><span class="status-icon">⚪</span> Stage 1: Style Conversion</div>
            <div class="status-item" id="st-2"><span class="status-icon">⚪</span> Stage 2: Dual-Guide Posing</div>
            <div class="status-item" id="st-3"><span class="status-icon">⚪</span> Stage 3: Texture Refinement</div>
            <div class="status-item" id="st-4"><span class="status-icon">⚪</span> Stage 4: 3D Mapping</div>
        </div>

        <div class="input-group" style="background: rgba(29, 185, 84, 0.1); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); margin-bottom: 24px;">
            <label style="color: var(--accent);">FAL_KEY (Required)</label>
            <input type="text" id="falKeyInput" placeholder="xxxx-xxxx-xxxx:yyyy-yyyy">
            <button type="button" id="testKeyBtn" style="margin-top: 10px; height: 36px; padding: 0; font-size: 11px;">Test Connection</button>
        </div>

        <div class="input-group">
            <label>1. Person Photo</label>
            <div class="file-input-area" id="photoDropArea">
                <span class="file-input-label" id="photoLabel">Upload Person</span>
                <img id="photoPreview">
                <button class="camera-btn" id="startCamBtn">📷 CAMERA</button>
                <input type="file" id="photoInput" accept="image/*" style="display:none;">
            </div>
        </div>

        <div class="input-group">
            <label>Detailed Prompt</label>
            <textarea id="p2" rows="4">１枚目の人物を２枚目のスタイルに変換、デフォルメして。
髪型、顔だち、服装の特徴を忠実に引き継ぎ、ちびキャラ（Chibi）スタイルでアメリカン・コミックス風に仕上げて。</textarea>
        </div>

        <div class="input-group">
            <label>T-Pose Pattern Guide</label>
            <div class="file-input-area" id="uvDropArea">
                <span class="file-input-label" id="uvLabel">Upload Pattern Guide</span>
                <img id="uvPatternPreview">
            </div>
            <input type="file" id="uvInput" accept="image/*" style="display:none;">
        </div>

        <button id="genBtn">START PIPELINE</button>
        <button id="applyCurrentBtn" style="background:#1e293b; color: white; margin-top: -10px; font-size: 11px;">APPLY CURRENT (SKIP AI)</button>

        <div class="preview-grid">
            <div class="preview-box">
                <div class="preview-controls" id="controls1">
                    <div class="settings-toggle" onclick="toggleSettings(1)">⚙️<div class="mode-dot" id="modeDot1"></div></div>
                    <div class="controls-content">
                        <div class="mode-text" id="modeText1">AUTO</div>
                        <label class="switch"><input type="checkbox" id="toggle1"><span class="slider"></span></label>
                        <button class="manual-btn" onclick="document.getElementById('manualIn1').click()">Manual</button>
                    </div>
                </div>
                <img id="img1"><input type="file" id="manualIn1" accept="image/*" style="display:none;">
                <div class="p-label">1. Styled</div>
            </div>

            <div class="preview-box">
                <div class="preview-controls" id="controls2">
                    <div class="settings-toggle" onclick="toggleSettings(2)">⚙️<div class="mode-dot" id="modeDot2"></div></div>
                    <div class="controls-content">
                        <div class="mode-text" id="modeText2">AUTO</div>
                        <label class="switch"><input type="checkbox" id="toggle2"><span class="slider"></span></label>
                        <button class="manual-btn" onclick="document.getElementById('manualIn2').click()">Manual</button>
                    </div>
                </div>
                <img id="img2"><input type="file" id="manualIn2" accept="image/*" style="display:none;">
                <div class="p-label">2. Pattern</div>
            </div>

            <div class="preview-box">
                <div class="preview-controls" id="controls3">
                    <div class="settings-toggle" onclick="toggleSettings(3)">⚙️<div class="mode-dot" id="modeDot3"></div></div>
                    <div class="controls-content">
                        <div class="mode-text" id="modeText3">AUTO</div>
                        <label class="switch"><input type="checkbox" id="toggle3"><span class="slider"></span></label>
                        <button class="manual-btn" onclick="document.getElementById('manualIn3').click()">Manual</button>
                    </div>
                </div>
                <img id="img3"><input type="file" id="manualIn3" accept="image/*" style="display:none;">
                <div class="p-label">3. Mask</div>
            </div>

            <div class="preview-box"><img id="img4"><div class="p-label">4. Result</div></div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraContainer">
        <video id="cameraVideo" autoplay playsinline></video>
        <div class="camera-overlay">
            <button class="snap-btn" id="snapBtn">CAPTURE PHOTO</button>
            <button class="close-btn" id="hideCamBtn">✕</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "fal": "https://esm.sh/@fal-ai/client@^1.2.0"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { fal } from 'fal';

        let scene, camera, renderer, model, mixer, clock;
        let basePhotoB64 = null, uvPatternB64 = null;
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const textureState = {
            1: { auto: null, manual: null, isManual: false },
            2: { auto: null, manual: null, isManual: false },
            3: { auto: null, manual: null, isManual: false }
        };

        // --- Core Utility: falFetch (Pure Client Side) ---
        async function falFetch(isEdit, payload) {
            const manualKey = document.getElementById('falKeyInput').value.trim();
            if (!manualKey) throw new Error("API Key is required. Please enter your FAL_KEY.");

            // Configure SDK directly
            fal.config({ credentials: manualKey, proxyUrl: null });

            const endpoint = isEdit ? "fal-ai/nano-banana-2/edit" : "fal-ai/nano-banana-2";
            console.log(`[falFetch] Calling ${endpoint}...`);
            
            const result = await fal.run(endpoint, { input: payload });
            
            // Wait for CDN propagation
            await sleep(2000);
            console.log(`[falFetch] Result received:`, JSON.stringify(result, null, 2));

            let url = null;
            if (result.images && result.images.length > 0) url = result.images[0].url;
            else if (result.image && result.image.url) url = result.image.url;
            else if (result.url) url = result.url;

            if (!url) throw new Error("Could not find image URL in the response.");
            return url;
        }

        async function run() {
            if (!basePhotoB64 || !uvPatternB64) return alert("Please upload both photos!");
            const manualKey = document.getElementById('falKeyInput').value.trim();
            if (!manualKey) return alert("Please enter your FAL_KEY first!");

            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            for(let i=1; i<=4; i++) updateStatus(i, 'idle');

            try {
                // Stage 1: Style
                updateStatus(1, 'loading');
                const res1 = await falFetch(true, {
                    prompt: document.getElementById('p2').value,
                    image_urls: [basePhotoB64]
                });
                textureState[1].auto = res1;
                updatePreview(1);
                updateStatus(1, 'done');
                await sleep(1000);

                // Stage 2: T-Pose Pattern Matching
                updateStatus(2, 'loading');
                const res2 = await falFetch(true, {
                    prompt: "Convert to T-pose pattern guide using the guide from Image 2",
                    image_urls: [res1, uvPatternB64]
                });
                textureState[2].auto = res2;
                updatePreview(2);
                updateStatus(2, 'done');
                await sleep(1000);

                // Stage 3: Alpha Mask
                updateStatus(3, 'loading');
                const res3 = await falFetch(true, {
                    prompt: "Professional 2D game mask texture, high contrast black and white silhouette",
                    image_urls: [res2]
                });
                textureState[3].auto = res3;
                updatePreview(3);
                updateStatus(3, 'done');

                // Stage 4: Apply to Model
                await applyToModel();
            } catch (e) {
                alert("Generation Error: " + e.message);
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        async function applyToModel() {
            updateStatus(4, 'loading');
            const colorSrc = textureState[2].isManual ? textureState[2].manual : textureState[2].auto;
            const maskSrc = textureState[3].isManual ? textureState[3].manual : textureState[3].auto;

            if (!colorSrc || !maskSrc) {
                updateStatus(4, 'idle');
                return;
            }

            const loader = new THREE.TextureLoader();
            const [texColor, texMask] = await Promise.all([
                new Promise(r => loader.load(colorSrc, r)),
                new Promise(r => loader.load(maskSrc, r))
            ]);

            texColor.colorSpace = THREE.SRGBColorSpace;
            texColor.flipY = true;
            texMask.flipY = true;

            if (model) {
                model.traverse(c => {
                    if (c.isMesh) {
                        c.material.map = texColor;
                        c.material.alphaMap = texMask;
                        c.material.transparent = true;
                        c.material.alphaTest = 0.5;
                        c.material.needsUpdate = true;
                    }
                });
            }
            updateStatus(4, 'done');
            document.getElementById('img4').src = colorSrc;
        }

        function updatePreview(id) {
            const state = textureState[id];
            const img = document.getElementById(`img${id}`);
            const modeText = document.getElementById(`modeText${id}`);
            const modeDot = document.getElementById(`modeDot${id}`);
            const toggle = document.getElementById(`toggle${id}`);
            toggle.checked = state.isManual;
            const src = state.isManual ? state.manual : state.auto;
            if (src) img.src = src;
            modeText.innerText = state.isManual ? "MANUAL" : "AUTO";
            state.isManual ? modeDot.classList.add('is-manual') : modeDot.classList.remove('is-manual');
        }

        window.toggleSettings = (id) => document.getElementById(`controls${id}`).classList.toggle('is-open');

        function updateStatus(step, state) {
            const item = document.getElementById(`st-${step}`);
            const icon = item.querySelector('.status-icon');
            item.classList.remove('active', 'done');
            if (state === 'loading') { item.classList.add('active'); icon.innerText = '⏳'; }
            else if (state === 'done') { item.classList.add('done'); icon.innerText = '✅'; }
            else icon.innerText = '⚪';
        }

        // --- Model Loading & Three.js Setup ---
        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 120, 300);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            new FBXLoader().load('peraman.fbx', (obj) => {
                model = obj;
                scene.add(obj);
                mixer = new THREE.AnimationMixer(obj);
                if (obj.animations && obj.animations.length > 0) mixer.clipAction(obj.animations[0]).play();
            });
            new OrbitControls(camera, renderer.domElement).target.set(0, 100, 0);
            document.getElementById('genBtn').onclick = run;
            document.getElementById('applyCurrentBtn').onclick = applyToModel;

            document.getElementById('testKeyBtn').onclick = async () => {
                const key = document.getElementById('falKeyInput').value.trim();
                if (!key) return alert("Enter key!");
                localStorage.setItem('fal_manual_key', key);
                const btn = document.getElementById('testKeyBtn');
                btn.innerText = "Testing...";
                try {
                    fal.config({ credentials: key, proxyUrl: null });
                    await fal.run("fal-ai/nano-banana-2", { input: { prompt: "test" } });
                    alert("SUCCESS!");
                } catch (e) { alert("FAILED: " + e.message); }
                finally { btn.innerText = "Test Connection"; }
            };

            // Setup File Inputs
            const setupId = (areaId, inputId, previewId, labelId, callback) => {
                const area = document.getElementById(areaId);
                const input = document.getElementById(inputId);
                area.onclick = () => input.click();
                input.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        callback(ev.target.result);
                        document.getElementById(previewId).src = ev.target.result;
                        document.getElementById(labelId).style.visibility = 'hidden';
                    };
                    reader.readAsDataURL(e.target.files[0]);
                };
            };
            setupId('photoDropArea', 'photoInput', 'photoPreview', 'photoLabel', v => basePhotoB64 = v);
            setupId('uvDropArea', 'uvInput', 'uvPatternPreview', 'uvLabel', v => uvPatternB64 = v);

            [1, 2, 3].forEach(id => {
                document.getElementById(`toggle${id}`).onchange = (e) => {
                    textureState[id].isManual = e.target.checked;
                    updatePreview(id);
                };
                document.getElementById(`manualIn${id}`).onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        textureState[id].manual = ev.target.result;
                        textureState[id].isManual = true;
                        updatePreview(id);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                };
            });

            // Camera handling
            let stream = null;
            document.getElementById('startCamBtn').onclick = async (e) => {
                e.stopPropagation();
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('cameraVideo').srcObject = stream;
                document.getElementById('cameraContainer').style.display = 'block';
            };
            document.getElementById('hideCamBtn').onclick = () => {
                stream.getTracks().forEach(t => t.stop());
                document.getElementById('cameraContainer').style.display = 'none';
            };
            document.getElementById('snapBtn').onclick = () => {
                const v = document.getElementById('cameraVideo');
                const canvas = document.createElement('canvas');
                canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                basePhotoB64 = canvas.toDataURL('image/png');
                document.getElementById('photoPreview').src = basePhotoB64;
                document.getElementById('photoLabel').style.visibility = 'hidden';
                document.getElementById('hideCamBtn').click();
            };

            const saved = localStorage.getItem('fal_manual_key');
            if (saved) document.getElementById('falKeyInput').value = saved;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (mixer) mixer.update(clock.getDelta());
            renderer.render(scene, camera);
        }

        init(); animate();
    </script>
</body>
</html>
