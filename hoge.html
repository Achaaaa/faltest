<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Loop - Turbo Version</title>
    <style>
        :root { --accent: #32CD32; --primary: #6366f1; }
        body { font-family: sans-serif; background: #f1f5f9; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .section { margin-bottom: 20px; padding: 15px; background: #fafafa; border: 1px solid #e2e8f0; border-radius: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.8rem; color: #475569; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        #editBtn { background: #475569; }
        #videoBtn { background: #8b5cf6; }
        #autoBtn { background: var(--primary); }
        .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .media-box { width: 100%; aspect-ratio: 1/1; background: #e2e8f0; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        img, video { width: 100%; height: 100%; object-fit: cover; }
        #status { font-weight: bold; text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .working { background: #e0e7ff; color: #4338ca; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Ready (Turbo Mode)</div>
    <div class="section">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="fal_key:xxx">
    </div>
    <div class="section">
        <label>1. Reference Image (image_9.png)</label>
        <input type="file" id="fileInput" accept="image/*">
        <textarea id="editPrompt" style="margin-top:10px;">A full-body 3D stylized chibi character figure, dynamic dance pose, pure lime green background (#32CD32).</textarea>
    </div>
    <div class="section">
        <label>2. Motion Settings (Turbo)</label>
        <input type="text" id="videoPrompt" value="dancing, looping, returning to starting pose, high quality">
        <div class="btn-group">
            <button id="editBtn">画像を生成</button>
            <button id="videoBtn">動画のみ</button>
            <button id="autoBtn">✨ 一括生成 (Turbo 1:1)</button>
        </div>
    </div>
    <div class="output-grid">
        <div class="box"><label>Image</label><div class="media-box" id="imgContainer"></div></div>
        <div class="box"><label>Video (Turbo Loop)</label><div class="media-box" id="videoContainer"></div></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'fal_key_turbo_v1';
    const el = id => document.getElementById(id);
    let lastImgUrl = null;
    let baseImageBase64 = null;

    window.onload = () => { if (localStorage.getItem(STORAGE_KEY)) el('apiKey').value = localStorage.getItem(STORAGE_KEY); };

    el('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            baseImageBase64 = ev.target.result;
            el('imgContainer').innerHTML = `<img src="${baseImageBase64}" style="opacity:0.5">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function setStatus(msg, isError = false) { 
        el('status').innerText = msg; 
        el('status').className = isError ? "error" : "working"; 
    }

    async function runImageGen() {
        const key = el('apiKey').value.trim();
        localStorage.setItem(STORAGE_KEY, key);
        setStatus("🎨 静止画を生成中...");
        
        const res = await fetch("https://fal.run/fal-ai/flux-2/flash/edit", {
            method: "POST",
            headers: { "Authorization": `Key ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                "image_urls": [baseImageBase64 || ""],
                "prompt": el('editPrompt').value,
                "strength": 0.8,
                "aspect_ratio": "1:1"
            })
        });
        const data = await res.json();
        lastImgUrl = data.images[0].url;
        el('imgContainer').innerHTML = `<img src="${lastImgUrl}">`;
        return lastImgUrl;
    }

    // --- 【Turbo版】コストを抑えつつループさせる設定 ---
    async function runVideoGen(imgUrl) {
        const key = el('apiKey').value.trim();
        setStatus("🎬 Turbo動画を生成中...");
        
        const res = await fetch("https://fal.run/fal-ai/wan/v2.2-a14b/image-to-video/turbo", {
            method: "POST",
            headers: { "Authorization": `Key ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                "image_url": imgUrl,        // 開始フレーム
                //"image_url_end": imgUrl,       // 候補1
                //"image_url_end_frame": imgUrl, // 候補2
                "end_image_url": imgUrl,       // 候補3
                "prompt": el('videoPrompt').value,
                "aspect_ratio": "1:1"
            })
        });

        const data = await res.json();
        if (data.video && data.video.url) {
            el('videoContainer').innerHTML = `<video controls autoplay loop><source src="${data.video.url}" type="video/mp4"></video>`;
            setStatus("✅ Turbo生成完了！");
        } else {
            throw new Error(JSON.stringify(data));
        }
    }

    el('editBtn').onclick = async () => { try { await runImageGen(); } catch(e) { setStatus(e.message, true); } };
    el('videoBtn').onclick = async () => { if(!lastImgUrl) return; try { await runVideoGen(lastImgUrl); } catch(e) { setStatus(e.message, true); } };
    el('autoBtn').onclick = async () => {
        el('autoBtn').disabled = true;
        try {
            const url = await runImageGen();
            await runVideoGen(url);
        } catch (e) { setStatus(e.message, true); } finally { el('autoBtn').disabled = false; }
    };
</script>
</body>
</html>
